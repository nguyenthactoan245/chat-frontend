<div style="min-height: 100vh; display: flex; align-items: center;
            justify-content: center; background: #f3f4f6;">
  <div style="background: white; padding: 32px; border-radius: 12px;
              width: 100%; max-width: 400px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">

    <h2 style="margin: 0 0 24px; text-align: center; color: #111;">Đăng ký</h2>

    <!-- Thông báo lỗi -->
    <div *ngIf="errorMessage"
         style="background: #fee2e2; color: #dc2626; padding: 10px 14px;
                border-radius: 6px; margin-bottom: 16px; font-size: 14px;">
      {{ errorMessage }}
    </div>

    <!-- Thông báo thành công -->
    <div *ngIf="successMessage"
         style="background: #dcfce7; color: #16a34a; padding: 10px 14px;
                border-radius: 6px; margin-bottom: 16px; font-size: 14px;">
      {{ successMessage }}
    </div>

    <!-- Username -->
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 14px; color: #374151; margin-bottom: 6px;">
        Username
      </label>
      <input [(ngModel)]="username" type="text" placeholder="Nhập username..."
             style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
                    border-radius: 6px; font-size: 14px; box-sizing: border-box;" />
    </div>

    <!-- Password -->
    <div style="margin-bottom: 24px;">
      <label style="display: block; font-size: 14px; color: #374151; margin-bottom: 6px;">
        Password
      </label>
      <input [(ngModel)]="password" type="password" placeholder="Nhập password..."
             style="width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
                    border-radius: 6px; font-size: 14px; box-sizing: border-box;" />
    </div>

    <!-- Nút đăng ký -->
    <button (click)="register()"
            style="width: 100%; padding: 10px; background: #4f46e5; color: white;
                   border: none; border-radius: 6px; font-size: 15px; cursor: pointer;">
      Đăng ký
    </button>

    <!-- Link đăng nhập -->
    <p style="text-align: center; margin-top: 16px; font-size: 14px; color: #6b7280;">
      Đã có tài khoản?
      <span (click)="goToLogin()"
            style="color: #4f46e5; cursor: pointer; font-weight: 500;">
        Đăng nhập
      </span>
    </p>

  </div>
</div>
